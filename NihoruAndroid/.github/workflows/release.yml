name: 🚀 Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Manual trigger button on GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Signed APK

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release-key.jks
          echo "Keystore decoded successfully"

      - name: 🔧 Make Gradle Executable
        run: chmod +x ./gradlew

      - name: 🏗️ Build Release APK
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: 📦 Get APK Info
        id: apk_info
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: 🏷️ Get Version from Tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=manual-build" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Nihoru ${{ steps.version.outputs.version }}"
          body: |
            ## 🎌 Nihoru Android App ${{ steps.version.outputs.version }}
            
            **What's new:**
            - Anime & Manga list converter
            - AniList API powered search
            - MAL XML export
            - Dark/Light theme
            
            **Download the APK below and install on your Android device.**
            > Enable "Install from unknown sources" in Settings if needed.
          files: ${{ steps.apk_info.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload APK as Artifact (for manual builds)
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: nihoru-release-apk
          path: ${{ steps.apk_info.outputs.apk_path }}
          retention-days: 7
